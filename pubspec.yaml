name: acv_motion_monitor
description: ACV Motion Monitor - prototipo para monitoreo de movimiento y ritmo cardiaco.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sensors_plus: ^5.0.1
  flutter_blue_plus: ^1.32.12
  permission_handler: ^11.3.1
  provider: ^6.1.2
  get_it: ^7.7.0
  rxdart: ^0.28.0
  logger: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
