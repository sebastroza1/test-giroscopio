plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def huaweiAppIdValue = project.findProperty("huaweiAppId") ?: "0"

android {
    namespace = "com.example.acv_motion_monitor"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        applicationId = "com.example.acv_motion_monitor"
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
        manifestPlaceholders["huaweiAppId"] = huaweiAppIdValue
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}


dependencies {
    implementation "com.huawei.hms:wearengine:5.0.0.300"
    implementation "com.huawei.hms:hihealth-base:5.0.0.300"
    implementation "com.huawei.hms:hwid:5.0.0.300"
}
